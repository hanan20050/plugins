name: House Upgrade Tracker Cron

on:
  schedule:
    - cron: '*/5 * * * *'  # Runs automatically every 5 minutes
  workflow_dispatch:        # Allows manual trigger anytime from GitHub UI

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Upgrade Tracker Script (5s Polling Loop)
        env:
          EXAROTON_TOKEN: ${{ secrets.EXAROTON_TOKEN }}
          EXAROTON_SERVER_ID: ${{ secrets.EXAROTON_SERVER_ID }}
          LOOP_MODE: "true"
          LOOP_DURATION: "270"
          POLL_INTERVAL: "5"
        run: python3 apply_house_upgrades.py

      - name: Commit and Push Processed Trades Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add Shopkeepers/processed_trades.json WorldGuard/worlds/world/regions.yml || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update processed trades & regions [skip ci]" && git push)
