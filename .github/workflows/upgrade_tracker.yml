name: House Upgrade Tracker Cron

on:
  workflow_dispatch:        # Manual trigger only (Railway handles 24/7 execution)

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Upgrade Tracker & Manan Join Notifier
        env:
          EXAROTON_TOKEN: ${{ secrets.EXAROTON_TOKEN }}
          EXAROTON_SERVER_ID: ${{ secrets.EXAROTON_SERVER_ID }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          LOOP_MODE: "true"
          LOOP_DURATION: "270"
          POLL_INTERVAL: "1"
        run: |
          python3 notify_manan_farm.py &
          python3 apply_house_upgrades.py

      - name: Commit and Push Processed Trades Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add Shopkeepers/processed_trades.json WorldGuard/worlds/world/regions.yml manan_notify_state.json || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update processed trades & regions [skip ci]" && git push)
